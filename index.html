<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arun's Master Task List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(15, 15, 15, 0.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid #1c1c1c;
      padding: 14px 20px;
    }

    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.3px;
    }

    .header-title p {
      font-size: 11px;
      color: #505050;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .overall-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .overall-bar .lbl { font-size: 11px; color: #606060; white-space: nowrap; }
    .overall-bar .pct { font-size: 11px; font-weight: 700; color: #4caf50; min-width: 28px; text-align: right; }

    .bar-track {
      width: 130px;
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .updated-note { font-size: 10px; color: #404040; }

    /* ── Board grid ── */
    .board {
      max-width: 1160px;
      margin: 18px auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      align-items: start;
    }

    @media (max-width: 780px) {
      .board { grid-template-columns: 1fr; padding: 0 12px 60px; }
      .header-inner { flex-direction: column; align-items: flex-start; gap: 8px; }
      .header-right { align-items: flex-start; }
      .bar-track { width: 100px; }
    }

    /* ── Section card ── */
    .section-card {
      background: #161616;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }

    .completed-section { grid-column: 1 / -1; }

    .section-head {
      padding: 13px 14px 10px;
      border-bottom: 1px solid #1e1e1e;
    }

    .section-label-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .s-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1px; flex: 1; }

    .s-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .section-prog { display: flex; align-items: center; gap: 7px; }
    .section-prog .cnt { font-size: 10px; color: #505050; min-width: 28px; }
    .section-prog .bar-track { flex: 1; height: 2px; }

    /* ── Task list ── */
    .tasks-wrap { padding: 5px; }

    .task-card {
      border-radius: 7px;
      border: 1px solid transparent;
      margin-bottom: 2px;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-card:last-child { margin-bottom: 0; }

    .task-card:hover { background: #1b1b1b; border-color: #242424; }

    .task-card.is-done { opacity: 0.42; }
    .task-card.is-done:hover { opacity: 0.65; }

    .task-top-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 9px 10px 9px 7px;
    }

    /* ── Custom checkbox (circle) ── */
    .cb-wrap { flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; }
    .cb-wrap input { display: none; }

    .cb-circle {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1.5px solid #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #fff;
      font-weight: bold;
      transition: all 0.15s;
      cursor: pointer;
      flex-shrink: 0;
    }

    .cb-wrap:hover .cb-circle { border-color: #4caf50; background: rgba(76,175,80,0.08); }
    .cb-wrap input:checked ~ .cb-circle { background: #4caf50; border-color: #4caf50; }

    /* ── Task info ── */
    .task-info { flex: 1; min-width: 0; cursor: pointer; user-select: none; }

    .task-name-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 5px; }

    .task-name { font-size: 12.5px; font-weight: 500; color: #d8d8d8; line-height: 1.4; }
    .task-name.done { text-decoration: line-through; color: #444; }

    .expand-arrow { font-size: 8px; color: #3a3a3a; flex-shrink: 0; margin-top: 3px; transition: color 0.15s; }
    .task-card:hover .expand-arrow { color: #555; }

    .task-pills { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }

    .pill {
      font-size: 9.5px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #1d1d1d;
      color: #585858;
      border: 1px solid #242424;
    }

    .due-pill { font-size: 9.5px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
    .due-hot  { background: rgba(224,90,78,0.1);  color: #e05a4e; }
    .due-soon { background: rgba(212,151,58,0.1); color: #d4973a; }
    .due-norm { background: #1a1a1a; color: #505050; }
    .due-overdue {
      background: rgba(224,90,78,0.18);
      color: #e05a4e;
      border: 1px solid rgba(224,90,78,0.35);
      animation: pulse-overdue 2s ease-in-out infinite;
    }

    @keyframes pulse-overdue {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    .done-stamp { font-size: 9.5px; color: #4caf50; opacity: 0.6; }

    .mini-prog { height: 1.5px; background: #1e1e1e; border-radius: 1px; margin-top: 6px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 1px; transition: width 0.35s ease; }

    /* ── Expanded body ── */
    .task-expanded { padding: 0 10px 10px 31px; }

    .task-desc {
      font-size: 11.5px;
      color: #505050;
      line-height: 1.55;
      padding: 8px 0;
      border-top: 1px solid #1c1c1c;
      border-bottom: 1px solid #1c1c1c;
      margin-bottom: 7px;
    }

    /* ── Steps ── */
    .steps { display: flex; flex-direction: column; }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 0;
      cursor: pointer;
    }

    .step-row input { display: none; }

    .step-box {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid #282828;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #888;
      font-weight: bold;
      transition: all 0.15s;
    }

    .step-row:hover .step-box { border-color: #3a3a3a; }
    .step-row input:checked ~ .step-box { background: #242424; border-color: #363636; }

    .step-txt { font-size: 11.5px; color: #686868; line-height: 1.4; }
    .step-row.done .step-txt { text-decoration: line-through; color: #383838; }

    /* ── Empty state ── */
    .all-done-msg { text-align: center; padding: 16px; font-size: 11px; opacity: 0.45; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252525; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#2a2a2a;font-size:12px;letter-spacing:0.08em">
      LOADING
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
